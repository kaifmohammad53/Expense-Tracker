<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker</title>
    <link rel="stylesheet" href="/ExpenseTracker/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>Expense Tracker</h1>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h3>Expense Tracker</h3>
            </div>
            <div class="setting">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-gear"></i>
            </div>
        </div>
        <div class="account">
            <div class="balance">
                <p class="heading">Your Balance</p>
                <div class="icon-con" style="background-color: green;">
                    <i class="fa-solid fa-rupee-sign icon"></i>
                    <p id="total" class="price">0</p>
                </div>
            </div>
            <div class="income">
                <p class="heading">Income</p>
                <div class="icon-con" style="color:green">
                    <i class="fa-solid fa-sort-up"></i>
                    <i class="fa-solid fa-rupee-sign icon"></i>
                    <p id="addIncome" class="price">0</p>
                </div>
            </div>
            <div class="expense">
                <p class="heading" id="head">Expenses</p>
                <div class="icon-con" style="color:red">
                    <i class="fa-solid fa-sort-down icon"></i>
                    <i class="fa-solid fa-rupee-sign icon"></i>
                    <p id="subExpense" class="price">0</p>
                </div>
            </div>
        </div>
        <div class="transaction">
            <div class="addTrs">
                <p>Add Transaction</p>
                <div class="input">
                    <input id="desEnter" type="text" placeholder="Enter Description">
                    <input id="amtEnter" type="number" placeholder="Enter Amount">
                </div>
                <div class="buttons">
                    <button id="income" style="background-color: green; font-size: 1.15rem;" >Add Income</button>
                    <button id="expense" style="background-color: red;">Add Expenses</button>
                </div>
            </div>
            <div class="trsHistory">
                <div class="history-head">
                    <p>Transaction History</p>
                    <button id="clear">Clear All</button>
                </div>
                <div class="history"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/ExpenseTracker/script.js"></script>
</body>
</html>
